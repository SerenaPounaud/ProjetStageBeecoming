<td>{{ticket.id}}</td>
<td>{{ticket.titre | titlecase}}</td>
<td>
    <span class="status" [ngClass]="getStatusStyle(ticket.status)" 
        [attr.aria-label]="'Statut : ' + (ticket.status | titlecase)">
    {{ticket.status | titlecase}}
    </span>
</td>
<td>
    <time [attr.datetime]="ticket.date | date:'yyyy-MM-dd'">{{ ticket.date | date:'dd-MM-yyyy' }}</time>
</td> 
<td>
    <span class="sr-only">Actions pour le ticket {{ticket.id}}</span>
    <button class="btn-card" type="button" (click)="edit()">Modifier</button>
    <button class="btn-card" type="button" (click)="ticketInfo()">Détails</button>
</td>
