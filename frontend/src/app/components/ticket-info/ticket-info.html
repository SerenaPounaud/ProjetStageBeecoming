<article class="ticket-container" *ngIf="ticket">
  <a routerLink="/" aria-label="Retour à la liste des tickets">← Retour</a>

  <h2 class="ticket-title">{{ ticket?.title | titlecase }}</h2>

  <dl class="ticket-info">
    <dt>Statut :</dt>
    <dd>
      <span class="status" [ngClass]="getStatusStyle(ticket.status)" [attr.aria-label]="'Statut du ticket : ' + (ticket?.status | titlecase)">
        {{ ticket?.status | titlecase }}
      </span>
    </dd>
  </dl>

  <dl class="ticket-info">
    <dt>Date :</dt>
    <dd>
      <time [attr.datetime]="ticket?.createdAt">{{ ticket?.createdAt | date:'dd/MM/yyyy' }}</time>
    </dd>
  </dl>

  <section class="ticket-description">
    <h3>Description</h3>
    <p>{{ ticket?.description }}</p>
  </section>
</article>
