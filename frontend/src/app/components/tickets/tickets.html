<section>
    <div class="header-dashboard">
        <h2>Tickets</h2>
        <select>
            <option>Tous</option>
            <option>Ouvert</option>
            <option>En cours</option>
            <option>Fermé</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Statut</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            @for(ticket of tickets; track ticket.id; let i =$index){
                <tr app-tickets-card [ticket]="ticket"></tr>
            }
            @empty{
                <tr>
                    <td colspan="6" class="empty-message">Aucun ticket trouvé</td>
                </tr>
            }
        </tbody>
    </table>
</section>
