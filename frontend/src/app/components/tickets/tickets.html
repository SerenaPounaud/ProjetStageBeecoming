<section>
    <div class="header-dashboard">
        <h2>Tickets</h2>
        <select>
            <option>Tous</option>
            <option>Ouvert</option>
            <option>En cours</option>
            <option>Fermé</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Statut</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            @for(ticket of tickets; track ticket.id; let i =$index){
                <tr>
                    <td>{{ticket.id}}</td>
                    <td>{{ticket.titre}}</td>
                    <td>
                        <span class="status" [ngClass]="getStatusStyle(ticket.status)">{{ticket.status}}</span>
                    </td>
                    <td>
                        <span>{{ticket.date | date:'dd-MM-yyyy'}}</span>
                    </td>
                    <td>
                        <button class="edit-btn">Modifier</button>
                    </td>
                </tr>
            }
            @empty{
                <tr>
                    <td colspan="6" class="empty-message">Aucun ticket trouvé</td>
                </tr>
            }
        </tbody>
    </table>
</section>
